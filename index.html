 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calculator">
    <h1>Calculator</h1>

    <!-- Expression Input -->
    <div class="input-group">
      <label for="expression">Expression:</label>
      <input type="text" id="expression" class="expression-input" placeholder="Enter expression..." spellcheck="false" autocomplete="off">
    </div>

    <!-- Output Display -->
    <div class="output-group">
      <label>Result:</label>
      <div id="output" class="output-display">0</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">

      <!-- Row 1: Clear & Backspace -->
      <button class="calc-btn action-btn" data-action="clear">AC</button>
      <button class="calc-btn action-btn" data-action="backspace">⌫</button>
      <button class="calc-btn" data-value="(">(</button>
      <button class="calc-btn" data-value=")">)</button>

      <!-- Row 2: Functions -->
      <button class="calc-btn fn-btn" data-value="sqrt(">sqrt</button>
      <button class="calc-btn fn-btn" data-value="sin(">sin</button>
      <button class="calc-btn fn-btn" data-value="cos(">cos</button>
      <button class="calc-btn fn-btn" data-value="tan(">tan</button>

      <!-- Row 3: Numbers 7-9, / -->
      <button class="calc-btn" data-value="7">7</button>
      <button class="calc-btn" data-value="8">8</button>
      <button class="calc-btn" data-value="9">9</button>
      <button class="calc-btn op-btn" data-value="/">÷</button>

      <!-- Row 4: Numbers 4-6, * -->
      <button class="calc-btn" data-value="4">4</button>
      <button class="calc-btn" data-value="5">5</button>
      <button class="calc-btn" data-value="6">6</button>
      <button class="calc-btn op-btn" data-value="*">×</button>

      <!-- Row 5: Numbers 1-3, - -->
      <button class="calc-btn" data-value="1">1</button>
      <button class="calc-btn" data-value="2">2</button>
      <button class="calc-btn" data-value="3">3</button>
      <button class="calc-btn op-btn" data-value="-">−</button>

      <!-- Row 6: 0, ., +, ^ -->
      <button class="calc-btn" data-value="0">0</button>
      <button class="calc-btn" data-value=".">.</button>
      <button class="calc-btn op-btn" data-value="+">+</button>
      <button class="calc-btn op-btn" data-value="^">^</button>

      <!-- Row 7: Equals (full width-ish) -->
      <button class="calc-btn equals-btn" data-action="calculate">=</button>

    </div>
  </div>

  <script src="scripts/parser.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
